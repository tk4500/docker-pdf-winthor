# /docker-pdf-winthor/frontend/nginx.conf
server {
    listen 80;
    server_name localhost;

    # Serve os arquivos do Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Essencial para SPAs (Angular, React, Vue) funcionar as rotas
        try_files $uri $uri/ /index.html;
    }

    # Redireciona chamadas da API para o container do backend
    # O frontend deve fazer requisições para /api/ (ex: /api/token)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}